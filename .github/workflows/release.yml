name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: aml-macos-arm64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: aml-macos-x86_64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: aml-windows-x86_64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: aml-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgtk-3-dev libxkbcommon-dev \
            libwayland-dev libegl-dev libgles-dev \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p app

      - name: Package (macOS / Linux)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release aml

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: 7z a ${{ matrix.archive }} target\${{ matrix.target }}\release\aml.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            aml-macos-arm64.tar.gz
            aml-macos-x86_64.tar.gz
            aml-windows-x86_64.zip
            aml-linux-x86_64.tar.gz
