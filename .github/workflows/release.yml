name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: AdobeMaybeLight-macos-arm64.zip
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: AdobeMaybeLight-macos-x86_64.zip
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: AdobeMaybeLight-windows-x86_64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: AdobeMaybeLight-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install libraw
          echo "LIBRAW_DIR=$(brew --prefix libraw)" >> $GITHUB_ENV

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pkg-config libraw-dev \
            libgtk-3-dev libxkbcommon-dev \
            libwayland-dev libegl-dev libgles-dev \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev
          echo "LIBRAW_DIR=/usr" >> $GITHUB_ENV

      - name: Install Windows deps
        if: runner.os == 'Windows'
        run: |
          vcpkg install libraw:x64-windows
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          echo "LIBRAW_DIR=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p app

      - name: Package macOS .app bundle
        if: runner.os == 'macOS'
        run: |
          BINARY="target/${{ matrix.target }}/release/aml"
          APP="AdobeMaybeLight.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks" "$APP/Contents/Resources"

          cp "$BINARY" "$APP/Contents/MacOS/aml"

          # Find and bundle the libraw dylib so users don't need it installed
          LIBRAW_LIB=$(otool -L "$BINARY" | awk '/libraw/{print $1}' | head -1)
          LIBRAW_REAL=$(python3 -c "import os; print(os.path.realpath('$LIBRAW_LIB'))")
          cp "$LIBRAW_REAL" "$APP/Contents/Frameworks/libraw.dylib"
          install_name_tool -change "$LIBRAW_LIB" "@executable_path/../Frameworks/libraw.dylib" "$APP/Contents/MacOS/aml"

          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>aml</string>
            <key>CFBundleIdentifier</key><string>com.catlover125r.adobemaybelight</string>
            <key>CFBundleName</key><string>AdobeMaybeLight</string>
            <key>CFBundleVersion</key><string>1.0</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          zip -r ${{ matrix.archive }} "$APP"

      - name: Package Linux
        if: runner.os == 'Linux'
        run: tar czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release aml

      - name: Package Windows
        if: runner.os == 'Windows'
        run: |
          copy target\${{ matrix.target }}\release\aml.exe .
          # raw_r.dll plus its dependencies (jpeg62, lcms2, jasper, zlib1, ...)
          copy C:\vcpkg\installed\x64-windows\bin\*.dll .
          7z a ${{ matrix.archive }} aml.exe *.dll

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            AdobeMaybeLight-macos-arm64.zip
            AdobeMaybeLight-macos-x86_64.zip
            AdobeMaybeLight-windows-x86_64.zip
            AdobeMaybeLight-linux-x86_64.tar.gz
